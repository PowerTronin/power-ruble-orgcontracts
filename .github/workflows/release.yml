name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build
        run: ./gradlew build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "build/libs/power-ruble-orgcontracts-${GITHUB_REF_NAME#v}.jar" \
            "build/libs/power-ruble-orgcontracts-${GITHUB_REF_NAME#v}-sources.jar" \
            --title "Power Ruble Org Contracts ${GITHUB_REF_NAME}" \
            --notes "Power Ruble Org Contracts release ${GITHUB_REF_NAME}."
